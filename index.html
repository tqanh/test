<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm chat..." onkeyup="chatApp.searchChats(this.value)">
                </div>
                <button class="new-chat-btn" onclick="chatApp.newChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Cuộc trò chuyện mới
                </button>
            </div>
            
            <div class="chat-list" id="chatList">
                <!-- Chat items will be rendered here -->
            </div>
            
            <div class="sidebar-footer">
                <button class="theme-toggle" onclick="chatApp.toggleTheme()" title="Chuyển theme">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <span id="themeText">Light</span>
                </button>
                <button class="settings-btn" onclick="chatApp.toggleSettings()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    Cài đặt
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main">
            <div class="chat-header">
                <button class="menu-toggle" onclick="chatApp.toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="model-selector">
                    <select id="modelSelect" onchange="chatApp.changeModel(this.value)">
                        <optgroup label="⭐ Gemini 3.x - Free Tier (Khuyên dùng)">
                            <option value="gemini-3.1-flash-lite-001">Gemini 3.1 Flash-Lite ⭐ (New)</option>
                            <option value="gemini-3-flash-001">Gemini 3 Flash (New)</option>
                        </optgroup>
                        <optgroup label="⚠️ Paid-Only từ 1/4/2026">
                            <option value="gemini-3.1-pro" disabled>Gemini 3.1 Pro (Cần thanh toán)</option>
                            <option value="gemini-3-pro" disabled>Gemini 3 Pro (Cần thanh toán)</option>
                            <option value="gemini-2.5-pro" disabled>Gemini 2.5 Pro (Cần thanh toán)</option>
                            <option value="gemini-2.5-flash" disabled>Gemini 2.5 Flash (Cần thanh toán)</option>
                        </optgroup>
                    </select>
                </div>
                <button class="header-btn" onclick="chatApp.exportChat()" title="Xuất chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>Bạn cần giúp gì?</h1>
                    <div class="prompt-suggestions">
                        <button class="prompt-card" onclick="chatApp.sendQuickMessage('Viết một đoạn code JavaScript để sắp xếp mảng')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2">
                                <polyline points="16 18 22 12 16 6"></polyline>
                                <polyline points="8 6 2 12 8 18"></polyline>
                            </svg>
                            <span>Viết code JavaScript</span>
                        </button>
                        <button class="prompt-card" onclick="chatApp.sendQuickMessage('Giải thích quantum computing đơn giản')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="16" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                            <span>Giải thích khái niệm</span>
                        </button>
                        <button class="prompt-card" onclick="chatApp.sendQuickMessage('Viết một bài thơ về công nghệ')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                <path d="M2 17l10 5 10-5"></path>
                                <path d="M2 12l10 5 10-5"></path>
                            </svg>
                            <span>Sáng tạo nội dung</span>
                        </button>
                        <button class="prompt-card" onclick="chatApp.sendQuickMessage('Dịch đoạn này sang tiếng Anh: Xin chào, tôi rất vui được gặp bạn')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                            <span>Dịch ngôn ngữ</span>
                        </button>
                    </div>
                </div>
                <div class="messages" id="messages"></div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="Nhập tin nhắn..."
                        rows="1"
                        onkeydown="chatApp.handleKeyDown(event)"
                    ></textarea>
                    <button class="send-btn" onclick="chatApp.sendMessage()" id="sendBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">AI có thể tạo ra thông tin không chính xác.</p>
            </div>
        </main>

        <!-- Settings Modal -->
        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Cài đặt</h2>
                    <button class="close-btn" onclick="chatApp.toggleSettings()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label>Google AI (Gemini) API Key</label>
                        <input type="password" id="apiKey" placeholder="AIzaSy...">
                        <p class="setting-hint">Lấy API key miễn phí tại <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a></p>
                    </div>
                    <div class="setting-group">
                        <label>System Prompt (Persona)</label>
                        <select id="systemPrompt" onchange="chatApp.setSystemPrompt(this.value)">
                            <option value="">Mặc định (Không có)</option>
                            <option value="code">👨‍💻 Senior Developer</option>
                            <option value="teacher">👨‍🏫 Giáo viên dễ hiểu</option>
                            <option value="creative">✍️ Creative Writer</option>
                            <option value="reviewer">� Code Reviewer</option>
                            <option value="translator">🌐 Translator Pro</option>
                            <option value="custom">✏️ Custom...</option>
                        </select>
                        <textarea id="customSystemPrompt" placeholder="Nhập system prompt tùy chỉnh..." style="display:none; margin-top:8px; width:100%; min-height:80px; background:var(--bg-primary); border:1px solid var(--border); color:var(--text-primary); padding:10px; border-radius:6px; font-family:inherit;"></textarea>
                    </div>
                    <div class="setting-group">
                        <label>Tags/Folders</label>
                        <div class="tag-list" id="tagList">
                            <button class="tag-btn active" onclick="chatApp.filterByTag('all')">Tất cả</button>
                            <button class="tag-btn" onclick="chatApp.filterByTag('code')">💻 Code</button>
                            <button class="tag-btn" onclick="chatApp.filterByTag('study')">📚 Học tập</button>
                            <button class="tag-btn" onclick="chatApp.filterByTag('work')">💼 Công việc</button>
                            <button class="tag-btn" onclick="chatApp.filterByTag('creative')">🎨 Sáng tạo</button>
                        </div>
                        <input type="text" id="chatTags" placeholder="Thêm tag cho chat này (phân cách bằng dấu phẩy)" style="width:100%; margin-top:8px; padding:8px; background:var(--bg-primary); border:1px solid var(--border); color:var(--text-primary); border-radius:6px;">
                    </div>
                    <div class="setting-group">
                        <button class="danger-btn" onclick="chatApp.clearAllChats()">
                            🗑️ Xóa tất cả cuộc trò chuyện
                        </button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-primary" onclick="chatApp.saveSettings()">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
