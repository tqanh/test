<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="chatApp.newChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Cuộc trò chuyện mới
                </button>
            </div>
            
            <div class="chat-list" id="chatList">
                <!-- Chat items will be rendered here -->
            </div>
            
            <div class="sidebar-footer">
                <button class="settings-btn" onclick="chatApp.toggleSettings()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    Cài đặt
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main">
            <div class="chat-header">
                <button class="menu-toggle" onclick="chatApp.toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="model-selector">
                    <select id="modelSelect" onchange="chatApp.changeModel(this.value)">
                        <optgroup label="⭐ Meta (Recommended)">
                            <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout 17B</option>
                            <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                            <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                        </optgroup>
                        <optgroup label="Groq">
                            <option value="groq/compound">Groq Compound</option>
                            <option value="groq/compound-mini">Groq Compound Mini</option>
                        </optgroup>
                        <optgroup label="OpenAI">
                            <option value="openai/gpt-oss-120b">GPT-OSS 120B</option>
                            <option value="openai/gpt-oss-20b">GPT-OSS 20B</option>
                            <option value="openai/gpt-oss-safeguard-20b">GPT-OSS Safeguard 20B</option>
                        </optgroup>
                        <optgroup label="Others">
                            <option value="qwen/qwen3-32b">Qwen3 32B (Alibaba)</option>
                            <option value="canopylabs/orpheus-v1-english">Orpheus English (Canopy)</option>
                            <option value="canopylabs/orpheus-arabic-saudi">Orpheus Arabic (Canopy)</option>
                            <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                        </optgroup>
                    </select>
                </div>
                <button class="header-btn" onclick="chatApp.exportChat()" title="Xuất chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>Bạn cần giúp gì?</h1>
                    <div class="prompt-suggestions">
                        <button class="prompt-card" onclick="chatApp.sendQuickMessage('Viết một đoạn code JavaScript để sắp xếp mảng')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2">
                                <polyline points="16 18 22 12 16 6"></polyline>
                                <polyline points="8 6 2 12 8 18"></polyline>
                            </svg>
                            <span>Viết code JavaScript</span>
                        </button>
                        <button class="prompt-card" onclick="chatApp.sendQuickMessage('Giải thích quantum computing đơn giản')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="16" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                            <span>Giải thích khái niệm</span>
                        </button>
                        <button class="prompt-card" onclick="chatApp.sendQuickMessage('Viết một bài thơ về công nghệ')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                <path d="M2 17l10 5 10-5"></path>
                                <path d="M2 12l10 5 10-5"></path>
                            </svg>
                            <span>Sáng tạo nội dung</span>
                        </button>
                        <button class="prompt-card" onclick="chatApp.sendQuickMessage('Dịch đoạn này sang tiếng Anh: Xin chào, tôi rất vui được gặp bạn')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10a37f" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                            <span>Dịch ngôn ngữ</span>
                        </button>
                    </div>
                </div>
                <div class="messages" id="messages"></div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="Nhập tin nhắn..."
                        rows="1"
                        onkeydown="chatApp.handleKeyDown(event)"
                    ></textarea>
                    <button class="send-btn" onclick="chatApp.sendMessage()" id="sendBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">AI có thể tạo ra thông tin không chính xác.</p>
            </div>
        </main>

        <!-- Settings Modal -->
        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Cài đặt</h2>
                    <button class="close-btn" onclick="chatApp.toggleSettings()">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label>Groq API Key</label>
                        <input type="password" id="apiKey" placeholder="gsk_...">
                        <p class="setting-hint">Lấy API key miễn phí tại <a href="https://console.groq.com" target="_blank">console.groq.com</a></p>
                    </div>
                    <div class="setting-group">
                        <label>Mẫu Prompt</label>
                        <div class="prompt-templates">
                            <button class="template-tag" onclick="chatApp.insertPrompt('Bạn là một chuyên gia lập trình. Hãy giúp tôi code: ')">
                                👨‍💻 Code Assistant
                            </button>
                            <button class="template-tag" onclick="chatApp.insertPrompt('Bạn là một giáo viên. Hãy giải thích đơn giản: ')">
                                👨‍🏫 Giáo viên
                            </button>
                            <button class="template-tag" onclick="chatApp.insertPrompt('Bạn là một copywriter. Hãy viết nội dung về: ')">
                                ✍️ Copywriter
                            </button>
                            <button class="template-tag" onclick="chatApp.insertPrompt('Hãy review code sau và chỉ ra các vấn đề: ')">
                                🔍 Code Review
                            </button>
                        </div>
                    </div>
                    <div class="setting-group">
                        <button class="danger-btn" onclick="chatApp.clearAllChats()">
                            🗑️ Xóa tất cả cuộc trò chuyện
                        </button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-primary" onclick="chatApp.saveSettings()">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
